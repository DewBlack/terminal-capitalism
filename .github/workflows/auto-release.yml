name: Auto Release

on:
  push:
    branches:
      - "main"
      - "pre"
      - "dev"
      - "chat/**"

permissions:
  contents: write

jobs:
  release:
    name: Create Automatic Release
    runs-on: ubuntu-latest
    concurrency:
      group: auto-release-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync git tags
        run: git fetch --force --tags origin

      - name: Compute release version
        id: version
        run: python3 scripts/utils/compute_release_version.py --branch "${GITHUB_REF_NAME}" --pre-release "true"

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.version.outputs.pre_release }}
          generate_release_notes: true
          body: |
            Automatic pre-release generated by CI.
            Branch: `${{ steps.version.outputs.branch }}`
            Version: `${{ steps.version.outputs.version }}`
            Previous base version: `${{ steps.version.outputs.base_version }}`
            Bump scope: `${{ steps.version.outputs.bump_scope }}`
            Commit: `${{ steps.version.outputs.short_sha }}`
