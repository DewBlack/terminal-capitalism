name: Content Validation

on:
  pull_request:
    branches: ["main", "dev", "pre"]
  push:
    branches: ["main", "dev", "pre"]

jobs:
  headless-smoke:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6-stable
      GODOT_BIN: Godot_v4.6-stable_linux.x86_64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download Godot binary
        run: |
          curl -L -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_BIN}.zip"
          unzip -o godot.zip
          chmod +x "${GODOT_BIN}"

      - name: Parse Smoke
        run: |
          ./"${GODOT_BIN}" --headless --path ./ --script scripts/utils/script_parse_smoke.gd

      - name: Weekly Balance Smoke
        run: |
          ./"${GODOT_BIN}" --headless --path ./ --script scripts/utils/weekly_cycle_regression_smoke.gd

      - name: Validate JSON content
        run: |
          ./"${GODOT_BIN}" --headless --path ./ --script scripts/utils/validate_content_json.gd
